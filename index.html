<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Öppna Sjökort</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --bg:    #0b1a2e;
      --panel: rgba(11,26,46,.97);
      --bdr:   rgba(255,255,255,.18);
      --muted: #b8d4e8;
      --gold:  #f5c842;
      --teal:  #2a8aaa;
      --green: #4ade80;
      --red:   #f87171;
      --s1:    #3b9eda;
      --s2:    #f5a623;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--bg); color:#fff; }
    #map { position:absolute; inset:0; z-index:0; }

    /* Top bar */
    #topbar {
      position:absolute; top:0; left:0; right:0; z-index:1000;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px 10px; pointer-events:none;
      background:linear-gradient(to bottom,rgba(11,26,46,.97) 65%,transparent);
    }
    .t-title { font-size:18px; font-weight:800; letter-spacing:1.5px; }
    .t-ver   { font-size:10px; font-weight:500; opacity:.45; margin-left:4px; }
    .t-sub   { font-size:11px; color:var(--muted); margin-top:2px; }
    #t-coords { text-align:right; font-family:monospace; font-size:12px;
      color:var(--gold); line-height:1.6; }

    /* GPS pill */
    #gps-pill {
      position:absolute; top:74px; left:50%; transform:translateX(-50%);
      z-index:1000; pointer-events:none;
      padding:6px 16px; border-radius:20px; font-size:12px; font-weight:600;
      border:1.5px solid var(--bdr); background:var(--panel);
      color:var(--muted); white-space:nowrap;
      transition: opacity .5s, color .3s, border-color .3s;
    }
    #gps-pill.search { border-color:var(--gold);  color:var(--gold);  }
    #gps-pill.ok     { border-color:var(--green); color:var(--green); }
    #gps-pill.err    { border-color:var(--red);   color:var(--red);   }

    /* Bottom bar */
    #bottom {
      position:absolute; bottom:0; left:0; right:0; z-index:1000;
      background:linear-gradient(to top,rgba(11,26,46,.97) 65%,transparent);
      padding:10px 14px 24px;
      transition: transform .25s ease;
    }
    #bottom.hidden { transform:translateY(110%); }

    /* Opacity row */
    #op-row {
      display:flex; align-items:center; gap:8px; margin-bottom:9px;
    }
    .or-dot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .or-name { font-size:11px; font-weight:700; color:#fff; flex-shrink:0;
      width:88px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #op-slider {
      flex:1; -webkit-appearance:none; height:4px;
      border-radius:2px; outline:none;
      background:rgba(255,255,255,.2);
    }
    #op-slider::-webkit-slider-thumb {
      -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
      background:var(--gold); border:2.5px solid var(--bg); cursor:pointer;
    }
    #op-slider:disabled { opacity:.35; }
    .or-pct { font-size:11px; font-weight:700; color:var(--gold);
      font-family:monospace; width:32px; text-align:right; flex-shrink:0; }

    /* Button row */
    .btns { display:flex; gap:7px; }
    .btn {
      flex:1; padding:11px 6px; border:none; border-radius:10px;
      font-size:11px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform .1s, opacity .1s;
    }
    .btn:active { transform:scale(.95); opacity:.8; }
    .btn-gold  { background:var(--gold); color:var(--bg); }
    .btn-glass { background:rgba(255,255,255,.12); color:#fff;
      border:1.5px solid rgba(255,255,255,.22); }
    .btn-glass.on     { background:var(--teal);  border-color:var(--teal);  }
    .btn-glass.pick   { background:rgba(245,200,66,.15); border-color:var(--gold); color:var(--gold); }
    .btn-glass.active { background:var(--gold); border-color:var(--gold); color:var(--bg); }

    /* Fake position card */
    #fake-card {
      position:absolute; bottom:90px; left:50%; transform:translateX(-50%);
      z-index:1000; display:none; align-items:center; gap:10px;
      background:rgba(15,8,35,.94); backdrop-filter:blur(6px);
      border:1.5px solid var(--gold); border-radius:12px;
      padding:8px 12px 8px 14px; white-space:nowrap;
      box-shadow:0 2px 14px rgba(245,200,66,.25);
    }
    #fake-card.visible { display:flex; }
    .fc-lbl  { font-size:10px; font-weight:800; color:var(--gold);
      letter-spacing:.8px; text-transform:uppercase; }
    .fc-coord { font-size:11px; font-family:monospace; color:#fff; line-height:1.5; }
    .fc-rm   { background:none; border:1.5px solid rgba(248,113,113,.5);
      border-radius:7px; color:var(--red); font-size:11px; font-weight:700;
      padding:5px 10px; cursor:pointer; }

    /* Full-screen panels */
    .panel {
      display:none; position:absolute; inset:0; z-index:1002;
      background:var(--panel); flex-direction:column;
    }
    .panel.open { display:flex; }
    .ph { padding:18px 18px 14px; border-bottom:1px solid var(--bdr); flex-shrink:0; }
    .ph-title { font-size:15px; font-weight:800; color:var(--gold);
      letter-spacing:.8px; text-transform:uppercase; }
    .ph-sub { font-size:13px; color:#fff; margin-top:5px; line-height:1.5; }
    .pb { flex:1; overflow-y:auto; padding:16px 18px; }
    .pf { padding:12px 18px 24px; border-top:1px solid var(--bdr);
      display:flex; gap:8px; flex-shrink:0; }
    .sec { font-size:10px; font-weight:800; color:var(--muted);
      letter-spacing:1px; text-transform:uppercase; margin:14px 0 8px; }
    .sec:first-child { margin-top:0; }

    /* Chart cards in layer panel */
    .cc { background:rgba(255,255,255,.07); border:1px solid var(--bdr);
      border-radius:10px; padding:14px; margin-bottom:8px; }
    .cc-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .cc-tog { width:40px; height:24px; border-radius:12px; border:none; cursor:pointer;
      background:rgba(255,255,255,.15); position:relative; transition:background .2s; flex-shrink:0; }
    .cc-tog.on { background:var(--teal); }
    .cc-tog::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px;
      border-radius:50%; background:#fff; transition:transform .2s; }
    .cc-tog.on::after { transform:translateX(16px); }
    .cc-name { font-size:13px; font-weight:700; color:#fff; }
    .cc-desc { font-size:11px; color:var(--muted); margin-top:2px; }
    .cc-st   { font-size:10px; margin-top:2px; }
    .cc-st.ok { color:var(--green); } .cc-st.err { color:var(--red); }
    .cc-st.loading { color:var(--gold); }
    .cc-sl-row { display:flex; align-items:center; gap:8px; }
    .cc-sl-lbl { font-size:11px; color:var(--muted); width:52px; flex-shrink:0; }
    .cc-sl { flex:1; -webkit-appearance:none; height:3px; border-radius:2px;
      background:var(--teal); outline:none; }
    .cc-sl::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px;
      border-radius:50%; background:var(--gold); border:2px solid var(--bg); cursor:pointer; }
    .cc-sl-val { font-size:11px; font-weight:700; color:var(--gold);
      font-family:monospace; width:30px; text-align:right; flex-shrink:0; }
    .cc-btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
    .cc-btn { padding:7px 11px; border:none; border-radius:8px; font-size:11px;
      font-weight:700; cursor:pointer; background:rgba(255,255,255,.1);
      color:#fff; border:1px solid rgba(255,255,255,.2); }
    .cc-btn.calib { background:rgba(42,138,170,.25); border-color:var(--teal); color:#7dd3fc; }
    .cc-btn:active { opacity:.7; }
    .info-box { padding:12px 14px; border-radius:8px; font-size:12px; line-height:1.7;
      background:rgba(255,255,255,.05); border:1px solid var(--bdr); color:var(--muted); }
    .info-box code { font-family:monospace; color:var(--gold); font-size:11px; }

    /* Pick banner */
    #pick-banner {
      display:none; position:absolute; top:0; left:0; right:0; z-index:1001;
      padding:14px 16px 16px;
      background:linear-gradient(135deg,rgba(11,26,46,.98),rgba(20,40,70,.98));
      border-bottom:2px solid var(--s1);
    }
    #pick-banner.visible { display:block; }
    .pb-row { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .pb-badge { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:800;
      letter-spacing:.8px; text-transform:uppercase; flex-shrink:0; }
    .badge-img { background:rgba(59,158,218,.25); color:var(--s1); border:1px solid var(--s1); }
    .badge-osm { background:rgba(245,166,35,.25); color:var(--s2); border:1px solid var(--s2); }
    .pb-title { font-size:15px; font-weight:800; color:#fff; margin-top:8px; }
    .pb-hint  { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.4; }
    #pick-cancel { padding:6px 12px; border:1.5px solid rgba(255,255,255,.3);
      border-radius:8px; background:transparent; color:var(--muted);
      font-size:12px; font-weight:700; cursor:pointer; }

    /* Confirm bar */
    #confirm-bar {
      display:none; position:absolute; bottom:0; left:0; right:0; z-index:1001;
      padding:14px 14px 28px;
      background:linear-gradient(to top,rgba(11,26,46,.98) 70%,transparent);
    }
    #confirm-bar.visible { display:block; }
    .ci { font-size:12px; color:var(--muted); font-family:monospace; margin-bottom:12px;
      padding:10px 14px; background:rgba(255,255,255,.07);
      border:1px solid var(--bdr); border-radius:8px; line-height:1.7; }
    .ci strong { color:#fff; }

    /* Calibration point cards */
    .pt-card { background:rgba(255,255,255,.07); border:1px solid var(--bdr);
      border-radius:10px; padding:12px 14px; margin-bottom:8px;
      display:flex; align-items:flex-start; gap:12px; }
    .pt-num { width:26px; height:26px; border-radius:50%; flex-shrink:0;
      background:var(--teal); display:flex; align-items:center;
      justify-content:center; font-size:12px; font-weight:800; }
    .pt-info { flex:1; font-size:11px; line-height:1.8;
      font-family:monospace; color:var(--muted); }
    .pt-info strong { color:#fff; font-size:12px; font-family:sans-serif; }
    .pt-del { padding:5px 10px; border:none; border-radius:6px;
      background:rgba(248,113,113,.2); color:var(--red); font-size:12px;
      font-weight:700; cursor:pointer; }
    .add-btn { width:100%; padding:13px; border:1.5px dashed rgba(255,255,255,.3);
      border-radius:10px; background:transparent; color:var(--muted);
      font-size:13px; font-weight:600; cursor:pointer; margin-bottom:8px; }
    .add-btn:active { background:rgba(255,255,255,.07); }
    .rms-good { padding:10px 14px; border-radius:8px; font-size:12px; font-weight:600;
      background:rgba(74,222,128,.12); border:1px solid rgba(74,222,128,.3); color:var(--green); margin-bottom:8px; }
    .rms-warn { padding:10px 14px; border-radius:8px; font-size:12px; font-weight:600;
      background:rgba(245,200,66,.12); border:1px solid rgba(245,200,66,.3); color:var(--gold); margin-bottom:8px; }
    .preset { width:100%; padding:11px 14px; margin-bottom:7px;
      background:rgba(255,255,255,.07); border:1px solid var(--bdr);
      border-radius:9px; color:#fff; font-size:12px; text-align:left;
      cursor:pointer; line-height:1.5; }
    .preset strong { color:var(--gold); }
    .preset small { font-family:monospace; font-size:11px; color:var(--muted); }
    .preset:active { background:rgba(42,138,170,.3); }

    /* GPS + calib markers */
    .gps-dot { width:14px; height:14px; position:relative; }
    .gps-dot::before { content:''; position:absolute; inset:0; border-radius:50%;
      background:var(--green); animation:gps-pulse 1.6s ease-out infinite; }
    .gps-dot::after  { content:''; position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%); width:10px; height:10px; border-radius:50%;
      background:var(--green); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.5); }
    @keyframes gps-pulse { 0%{transform:scale(1);opacity:.3} 100%{transform:scale(3.5);opacity:0} }
    .fake-pin { width:14px; height:14px; border-radius:50%;
      background:var(--gold); border:2.5px solid #fff;
      box-shadow:0 0 0 3px rgba(245,200,66,.3),0 2px 6px rgba(0,0,0,.5); }
    .cpin { width:28px; height:28px; border-radius:50%; border:3px solid #fff;
      box-shadow:0 2px 8px rgba(0,0,0,.6); display:flex; align-items:center;
      justify-content:center; font-size:12px; font-weight:900; }
    .cpin-img { background:var(--s1); color:#fff; }
    .cpin-osm { background:var(--s2); color:#fff; }
    .xhair { width:28px; height:28px; position:relative; }
    .xhair::before,.xhair::after { content:''; position:absolute; background:var(--gold); }
    .xhair::before { top:50%;left:0;right:0;height:2px;transform:translateY(-50%); }
    .xhair::after  { left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%); }


    /* ── Depth badge ── */
    #depth-badge {
      position: absolute;
      left: 12px; bottom: 90px;
      z-index: 1000;
      background: rgba(11,26,46,.90);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      padding: 7px 12px;
      display: none;
      flex-direction: column;
      gap: 1px;
      min-width: 130px;
    }
    #depth-badge.visible { display: flex; }
    .db-label { font-size:9px; font-weight:800; color:var(--muted);
      letter-spacing:.8px; text-transform:uppercase; }
    .db-value { font-size:14px; font-weight:800; color:#fff; }
    .db-range { font-size:11px; color:var(--teal); }
    .db-warn  { font-size:9px;  color:rgba(255,255,255,.35); margin-top:2px; }
    /* Leaflet overrides */
    .leaflet-pane,.leaflet-map-pane { z-index:1 !important; }
    .leaflet-tile-pane    { z-index:2 !important; }
    .leaflet-overlay-pane { z-index:3 !important; }
    .leaflet-marker-pane  { z-index:4 !important; }
    .leaflet-popup-pane   { z-index:5 !important; }
    .leaflet-top,.leaflet-bottom { z-index:6 !important; }
    .leaflet-control-zoom,.leaflet-control-attribution { display:none; }
    .leaflet-popup-content-wrapper { background:#0f2035;
      border:1px solid rgba(255,255,255,.2); color:#fff;
      border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.5); }
    .leaflet-popup-tip { background:#0f2035; }
    .leaflet-popup-content { font-family:monospace; font-size:12px;
      line-height:1.7; margin:10px 14px; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div>
    <div class="t-title">⚓ Öppna Sjökort <span class="t-ver">v6.1</span></div>
    <div class="t-sub" id="t-sub">Laddar kartor…</div>
  </div>
  <div id="t-coords"><span id="t-lat">–</span><br><span id="t-lon">–</span></div>
</div>
<div id="gps-pill" class="search">◎ Söker GPS…</div>

<div id="map"></div>

<!-- Depth badge -->
<div id="depth-badge">
  <span class="db-label">Uppskattat djup</span>
  <span class="db-value" id="db-value">–</span>
  <span class="db-range" id="db-range"></span>
  <span class="db-warn">⚠ Ungefärligt</span>
</div>

<!-- Fake position card -->
<div id="fake-card">
  <div>
    <div class="fc-lbl">📍 Testposition</div>
    <div class="fc-coord" id="fc-lat">–</div>
    <div class="fc-coord" id="fc-lon">–</div>
  </div>
  <button class="fc-rm" onclick="clearFake()">✕ Ta bort</button>
</div>

<!-- Bottom bar -->
<div id="bottom">
  <div id="op-row">
    <div class="or-dot" id="or-dot" style="background:var(--teal)"></div>
    <span class="or-name" id="or-name">–</span>
    <input type="range" id="op-slider" min="0" max="100" value="85"
      oninput="opSlide(this)" disabled>
    <span class="or-pct" id="or-pct">85%</span>
  </div>
  <div class="btns">
    <button class="btn btn-gold"  onclick="locateMe()">◎ Hitta mig</button>
    <button class="btn btn-glass on" id="btn-osm"  onclick="toggleOSM()">⊞ OSM</button>
    <button class="btn btn-glass" id="btn-fake" onclick="toggleFake()">📍 Testa</button>
    <button class="btn btn-glass" id="btn-fs"   onclick="toggleFS()">⛶ Fullskärm</button>
    <button class="btn btn-glass" onclick="openLayers()">☰ Lager</button>
  </div>
</div>

<!-- Pick banner -->
<div id="pick-banner">
  <div class="pb-row">
    <span id="pb-badge" class="pb-badge badge-img">Sjökort</span>
    <button id="pick-cancel" onclick="cancelPick()">✕ Avbryt</button>
  </div>
  <div class="pb-title" id="pb-title">Tryck på sjökortet</div>
  <div class="pb-hint"  id="pb-hint">Välj en känd plats</div>
</div>

<!-- Confirm bar -->
<div id="confirm-bar">
  <div class="ci" id="ci">–</div>
  <div class="btns">
    <button class="btn btn-glass" style="background:rgba(248,113,113,.2);border-color:var(--red);color:var(--red)"
      onclick="retryPick()">↩ Försök igen</button>
    <button class="btn btn-gold" onclick="confirmPick()">✓ Bekräfta</button>
  </div>
</div>

<!-- Layer panel -->
<div id="layer-panel" class="panel">
  <div class="ph">
    <div class="ph-title">☰ Lager</div>
    <div class="ph-sub">Hantera sjökort</div>
  </div>
  <div class="pb" id="layer-body"></div>
  <div class="pf" style="flex-direction:column;gap:8px">
    <div style="display:flex;gap:8px">
      <button class="btn btn-glass" style="font-size:11px" onclick="exportCalib()">⬇ Exportera kalibrering</button>
      <button class="btn btn-glass" style="font-size:11px" onclick="document.getElementById('imp').click()">⬆ Importera</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importCalib(this)">
    </div>
    <button class="btn btn-glass" onclick="closeLayers()">✕ Stäng</button>
  </div>
</div>

<!-- Calibration panel -->
<div id="calib-panel" class="panel">
  <div class="ph">
    <div class="ph-title">⊕ Kalibrera</div>
    <div class="ph-sub" id="calib-name">–</div>
  </div>
  <div class="pb" id="calib-body"></div>
  <div class="pf">
    <button class="btn btn-glass" style="max-width:90px" onclick="closeCalib()">✕ Stäng</button>
    <button class="btn btn-gold" id="apply-btn" onclick="applyCalib()" style="display:none">✓ Tillämpa</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════════════════
const map = L.map('map', { center:[57.990,12.509], zoom:13,
  zoomControl:false, attributionControl:false });
const osmTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { opacity:.45, maxZoom:19 }).addTo(map);
let osmOn = true;

// ═══════════════════════════════════════════════════════════════════
//  CHART REGISTRY
// ═══════════════════════════════════════════════════════════════════
const COLORS = ['#2a8aaa','#f5a623','#9b59b6','#2ecc71','#e74c3c'];
let charts = [];

const lsKey  = id => `oc_chart_v1_${id}`;
const lsApp  = ()  => 'oc_app_v1';

function saveChart(c) {
  localStorage.setItem(lsKey(c.id),
    JSON.stringify({ sw:c._sw, ne:c._ne, opacity:c._opacity, visible:c._visible }));
}
function loadChart(c) {
  try {
    const s = JSON.parse(localStorage.getItem(lsKey(c.id)));
    if (s) {
      if (s.sw)      c._sw      = s.sw;
      if (s.ne)      c._ne      = s.ne;
      if (s.opacity != null) c._opacity = s.opacity;
      if (s.visible != null) c._visible = s.visible;
    }
  } catch(e) {}
}
function saveApp() {
  localStorage.setItem(lsApp(), JSON.stringify({ osmOn }));
}
function loadApp() {
  try {
    const s = JSON.parse(localStorage.getItem(lsApp()));
    if (s && s.osmOn === false) {
      osmOn = false;
      map.removeLayer(osmTile);
      document.getElementById('btn-osm').classList.remove('on');
    }
  } catch(e) {}
}

async function initCharts(rawList) {
  for (const r of rawList) {
    const c = {
      id:          r.id,
      name:        r.name,
      description: r.description || '',
      file:        r.file,
      defaultBounds: r.defaultBounds,
      _sw:      r.defaultBounds.sw.slice(),
      _ne:      r.defaultBounds.ne.slice(),
      _opacity: r.defaultOpacity ?? 0.85,
      _visible: true,
      _layer:   null,
      _status:  'loading',
    };
    loadChart(c);
    charts.push(c);
    fetchChart(c);
  }
  updateSub();
}

function fetchChart(c) {
  c._status = 'loading';
  const img = new Image();
  img.onload = () => {
    c._status = 'ok';
    if (c._visible) addLayer(c);
    updateSub();
    updateOpRow();
    renderLayerBody();
    fitVisible();
    prepDepthCanvas(c);
  };
  img.onerror = () => { c._status = 'error'; renderLayerBody(); };
  img.src = c.file;
}

function addLayer(c) {
  if (c._layer) map.removeLayer(c._layer);
  c._layer = L.imageOverlay(c.file, [c._sw, c._ne],
    { opacity:c._opacity, interactive:false, zIndex:10+charts.indexOf(c) }
  ).addTo(map);
  if (osmOn) osmTile.bringToBack();
}
function removeLayer(c) {
  if (c._layer) { map.removeLayer(c._layer); c._layer = null; }
}
function rebuildLayer(c) {
  (c._visible && c._status === 'ok') ? addLayer(c) : removeLayer(c);
  if (osmOn) osmTile.bringToBack();
}

function updateSub() {
  const vis = charts.filter(c => c._visible && c._status === 'ok');
  document.getElementById('t-sub').textContent =
    vis.length ? vis.map(c=>c.name).join(' · ') : 'Inga sjökort aktiva';
}

function fitVisible() {
  const ok = charts.filter(c => c._status === 'ok');
  if (!ok.length) return;
  map.fitBounds(
    ok.map(c => L.latLngBounds(c._sw, c._ne)).reduce((a,b) => a.extend(b)),
    { padding:[12,12] }
  );
}

// ═══════════════════════════════════════════════════════════════════
//  GPS
// ═══════════════════════════════════════════════════════════════════
let locMk = null, accCircle = null, firstFix = true;
const locIcon = L.divIcon({ className:'',
  html:'<div class="gps-dot"></div>', iconSize:[14,14], iconAnchor:[7,7] });

function startGPS() {
  if (!navigator.geolocation) { setPill('GPS saknas','err'); return; }
  setPill('◎ Söker…','search');
  navigator.geolocation.watchPosition(
    p => {
      const ll = L.latLng(p.coords.latitude, p.coords.longitude);
      const a  = p.coords.accuracy;
      locMk
        ? (locMk.setLatLng(ll), accCircle.setLatLng(ll).setRadius(a))
        : (locMk    = L.marker(ll, { icon:locIcon, zIndexOffset:999 }).addTo(map),
           accCircle = L.circle(ll, { radius:a, color:'#4ade80', fillColor:'#4ade80',
             fillOpacity:.07, weight:1, opacity:.4 }).addTo(map));
      if (!fakePos) {
        document.getElementById('t-lat').textContent = dms(ll.lat,'N','S');
        document.getElementById('t-lon').textContent = dms(ll.lng,'E','W');
      }
      if (firstFix) { firstFix=false; map.setView(ll,14,{animate:true}); }
      updateDepth();
      const as = a < 10 ? a.toFixed(1)+'m' : Math.round(a)+'m';
      setPill('◎ GPS aktiv · ±'+as,'ok');
      setTimeout(() => {
        if (document.getElementById('gps-pill').classList.contains('ok'))
          document.getElementById('gps-pill').style.opacity = '0';
      }, 3500);
    },
    e => setPill(['','Nekat','Ej tillgänglig','Timeout'][e.code]||'GPS-fel','err'),
    { enableHighAccuracy:true, maximumAge:2000, timeout:15000 }
  );
}
function setPill(t,c) {
  const e = document.getElementById('gps-pill');
  e.textContent=t; e.className=c; e.style.opacity='1';
}
function dms(v,p,n) {
  const d=v>=0?p:n, a=Math.abs(v), g=Math.floor(a), m=((a-g)*60).toFixed(3);
  return g+'° '+m+'′ '+d;
}
function locateMe() {
  locMk ? map.setView(locMk.getLatLng(),15,{animate:true}) : startGPS();
}

// ═══════════════════════════════════════════════════════════════════
//  OPACITY ROW — controls the chart you're most over
// ═══════════════════════════════════════════════════════════════════
function getActiveIdx() {
  const ref = fakePos || map.getCenter();
  const lat = ref.lat, lng = ref.lng;
  const ok  = charts.map((c,i)=>({c,i})).filter(({c})=>c._visible&&c._status==='ok');
  if (!ok.length) return -1;
  const over = ok.filter(({c}) =>
    lat>=c._sw[0]&&lat<=c._ne[0]&&lng>=c._sw[1]&&lng<=c._ne[1]);
  const pool = over.length ? over : ok;
  pool.sort((a,b) => {
    const dist = x => Math.hypot(lat-(x._sw[0]+x._ne[0])/2, lng-(x._sw[1]+x._ne[1])/2);
    return dist(a.c)-dist(b.c);
  });
  return pool[0].i;
}

function updateOpRow() {
  const idx  = getActiveIdx();
  const sl   = document.getElementById('op-slider');
  const dot  = document.getElementById('or-dot');
  const name = document.getElementById('or-name');
  const pct  = document.getElementById('or-pct');
  if (idx < 0) {
    sl.disabled = true;
    dot.style.background = 'rgba(255,255,255,.2)';
    name.textContent = 'Ingen karta';
    return;
  }
  const c = charts[idx], color = COLORS[idx % COLORS.length];
  sl.disabled = false;
  dot.style.background = color;
  name.textContent = c.name;
  const v = Math.round(c._opacity*100);
  sl.value = v;
  pct.textContent = v+'%';
}

function opSlide(el) {
  const idx = getActiveIdx();
  if (idx < 0) return;
  const c = charts[idx], v = +el.value;
  c._opacity = v/100;
  if (c._layer) c._layer.setOpacity(c._opacity);
  document.getElementById('or-pct').textContent = v+'%';
  saveChart(c);
  if (document.getElementById('layer-panel').classList.contains('open')) renderLayerBody();
}

map.on('moveend', () => { updateOpRow(); updateDepth(); });

let fakeOn  = false;   // picking mode
let fakePos = null;    // { lat, lng }
let fakeMk  = null;
const fakePinIcon = L.divIcon({
  className:'', html:'<div class="fake-pin"></div>',
  iconSize:[14,14], iconAnchor:[7,7]
});

function toggleFake() {
  fakeOn = !fakeOn;
  const btn = document.getElementById('btn-fake');
  btn.classList.toggle('pick', fakeOn);
  btn.textContent = fakeOn ? '📍 Klicka…' : (fakePos ? '📍 Aktiv' : '📍 Testa');
}

function setFake(lat, lng) {
  fakePos = { lat, lng }; fakeOn = false;
  const ll = L.latLng(lat, lng);
  fakeMk ? fakeMk.setLatLng(ll)
         : (fakeMk = L.marker(ll,{icon:fakePinIcon,zIndexOffset:998}).addTo(map));
  document.getElementById('fc-lat').textContent = dms(lat,'N','S');
  document.getElementById('fc-lon').textContent = dms(lng,'E','W');
  document.getElementById('fake-card').classList.add('visible');

  document.getElementById('t-lon').textContent = dms(lng,'E','W');
  const btn = document.getElementById('btn-fake');
  btn.classList.remove('pick'); btn.classList.add('active');
  btn.textContent = '📍 Aktiv';
  updateOpRow();
  updateDepth();
}

function clearFake() {
  fakePos = null; fakeOn = false;
  if (fakeMk) { map.removeLayer(fakeMk); fakeMk = null; }
  document.getElementById('fake-card').classList.remove('visible');
  const btn = document.getElementById('btn-fake');
  btn.classList.remove('pick','active'); btn.textContent = '📍 Testa';
  if (locMk) {
    const ll = locMk.getLatLng();
    document.getElementById('t-lat').textContent = dms(ll.lat,'N','S');
    document.getElementById('t-lon').textContent = dms(ll.lng,'E','W');
  } else {
    document.getElementById('t-lat').textContent = '–';
    document.getElementById('t-lon').textContent = '–';
  }
  updateOpRow();
  updateDepth();
}

// ═══════════════════════════════════════════════════════════════════
//  LAYER PANEL
// ═══════════════════════════════════════════════════════════════════
function openLayers()  { renderLayerBody(); document.getElementById('layer-panel').classList.add('open'); }
function closeLayers() { document.getElementById('layer-panel').classList.remove('open'); }

function renderLayerBody() {
  let h = '<div class="sec">Sjökort</div>';
  if (!charts.length) {
    h += '<div class="info-box">Inga kartor i <code>charts.json</code></div>';
  } else {
    charts.forEach((c,i) => {
      const stTxt = { loading:'Laddar…', ok:'Inläst ✓', error:'Kunde inte laddas ✕' }[c._status];
      const stCls = { loading:'loading', ok:'ok', error:'err' }[c._status];
      const op = Math.round(c._opacity*100);
      h += `<div class="cc">
        <div class="cc-row">
          <button class="cc-tog ${c._visible&&c._status==='ok'?'on':''}"
            onclick="toggleChart(${i})" ${c._status!=='ok'?'disabled':''}></button>
          <div><div class="cc-name">${c.name}</div>
          <div class="cc-desc">${c.description}</div>
          <div class="cc-st ${stCls}">${stTxt}</div></div>
        </div>
        ${c._status==='ok'?`
        <div class="cc-sl-row">
          <span class="cc-sl-lbl">Opacitet</span>
          <input class="cc-sl" type="range" min="0" max="100" value="${op}"
            oninput="setChartOp(${i},this.value,this.nextElementSibling)">
          <span class="cc-sl-val">${op}%</span>
        </div>
        <div class="cc-btns">
          <button class="cc-btn calib" onclick="openCalib(${i})">⊕ Kalibrera</button>
          <button class="cc-btn" onclick="fitChart(${i})">⛶ Passa</button>
          ${i>0?`<button class="cc-btn" onclick="moveChart(${i},-1)">↑</button>`:''}
          ${i<charts.length-1?`<button class="cc-btn" onclick="moveChart(${i},1)">↓</button>`:''}
        </div>`:''}
      </div>`;
    });
  }
  h += `<div class="sec">Lägg till fler kartor</div>
  <div class="info-box">
    Lägg till direkt i GitHub:<br><br>
    1. Lägg bilden i <code>charts/</code><br>
    2. Lägg till en rad i <code>charts.json</code><br>
    3. Appen laddar den automatiskt
  </div>`;
  document.getElementById('layer-body').innerHTML = h;
}

function toggleChart(i) {
  const c=charts[i]; c._visible=!c._visible;
  rebuildLayer(c); saveChart(c); renderLayerBody(); updateOpRow(); updateSub();
}
function setChartOp(i,v,lbl) {
  const c=charts[i]; c._opacity=v/100;
  if(c._layer) c._layer.setOpacity(c._opacity);
  if(lbl) lbl.textContent=v+'%';
  saveChart(c);
  updateOpRow();
}
function fitChart(i) { map.fitBounds([charts[i]._sw,charts[i]._ne],{padding:[16,16]}); closeLayers(); }
function moveChart(i,d) {
  const j=i+d; if(j<0||j>=charts.length) return;
  [charts[i],charts[j]]=[charts[j],charts[i]];
  charts.forEach(rebuildLayer); renderLayerBody();
}

// ═══════════════════════════════════════════════════════════════════
//  CALIBRATION
// ═══════════════════════════════════════════════════════════════════
let calibIdx = -1;
let pickState = 'idle';
let refs = [], tempIX, tempIY, tempLat, tempLng, tempPin, cPins = [];

const ipIcon = n => L.divIcon({className:'',html:`<div class="cpin cpin-img">${n}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
const opIcon = n => L.divIcon({className:'',html:`<div class="cpin cpin-osm">${n}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
const xIcon  = L.divIcon({className:'',html:'<div class="xhair"></div>',iconSize:[28,28],iconAnchor:[14,14]});

function openCalib(i) {
  calibIdx=i; refs=[]; cPins.forEach(p=>map.removeLayer(p)); cPins=[];
  closeLayers();
  document.getElementById('calib-name').textContent = charts[i].name;
  renderCalibBody();
  document.getElementById('calib-panel').classList.add('open');
}
function closeCalib() { document.getElementById('calib-panel').classList.remove('open'); }

function renderCalibBody() {
  const c=charts[calibIdx], n=refs.length;
  let h='';
  if(n>0){
    h+='<div class="sec">Tillagda punkter</div>';
    refs.forEach((r,i)=>{ h+=`<div class="pt-card">
      <div class="pt-num">${i+1}</div>
      <div class="pt-info"><strong>Punkt ${i+1}</strong><br>
        Sjökort: ${(r.imgX*100).toFixed(1)}% X · ${(r.imgY*100).toFixed(1)}% Y<br>
        ${dms(r.lat,'N','S')}<br>${dms(r.lng,'E','W')}</div>
      <button class="pt-del" onclick="delRef(${i})">✕</button></div>`; });
    if(n>=2){
      const nb=calcBounds(c), rms=calcRMS(refs,nb);
      h+=`<div class="${rms<50?'rms-good':'rms-warn'}">⊙ Medelfel: ${rms<10?rms.toFixed(1):Math.round(rms)} m (${n} punkter)</div>`;
    }
  }
  h+=`<button class="add-btn" onclick="startPick()">+ Lägg till punkt ${n+1}</button>
  <div class="sec">Förinställningar</div>`;
  const db = charts[calibIdx].defaultBounds;
  h+=`<button class="preset" onclick='applyPreset(${JSON.stringify(db.sw)},${JSON.stringify(db.ne)})'><strong>Återställ standard</strong><br><small>SW ${db.sw.map(v=>v.toFixed(3)).join(', ')} · NE ${db.ne.map(v=>v.toFixed(3)).join(', ')}</small></button>`;
  document.getElementById('calib-body').innerHTML = h;
  const ab=document.getElementById('apply-btn');
  if(n>=2){ab.style.display='';ab.textContent=`✓ Tillämpa (${n} punkter)`;}
  else ab.style.display='none';
}

function startPick() {
  document.getElementById('calib-panel').classList.remove('open');
  document.getElementById('bottom').classList.add('hidden');
  const c=charts[calibIdx], pn=refs.length+1;
  if(c._layer) c._layer.setOpacity(.90);
  if(!osmOn) osmTile.addTo(map); osmTile.bringToBack();
  document.getElementById('pb-badge').textContent=`PUNKT ${pn} · STEG 1/2`;
  document.getElementById('pb-badge').className='pb-badge badge-img';
  document.getElementById('pb-title').textContent='Tryck på sjökortet vid en känd plats';
  document.getElementById('pb-hint').textContent='T.ex. brygga, udde eller ö du känner igen';
  document.getElementById('pick-banner').classList.add('visible');
  pickState='picking-img'; map.on('click', onPickClick);
}

function onPickClick(e) {
  const ll=e.latlng, c=charts[calibIdx];
  if(pickState==='picking-img'||pickState==='img-pending'){
    if(tempPin) map.removeLayer(tempPin);
    tempPin=L.marker(ll,{icon:xIcon,zIndexOffset:2000}).addTo(map);
    tempIX=Math.max(0,Math.min(1,(ll.lng-c._sw[1])/(c._ne[1]-c._sw[1])));
    tempIY=Math.max(0,Math.min(1,(c._ne[0]-ll.lat)/(c._ne[0]-c._sw[0])));
    const pn=refs.length+1;
    document.getElementById('ci').innerHTML=
      `<strong>Punkt ${pn} – Sjökortsposition</strong><br>`+
      `${(tempIX*100).toFixed(1)}% X · ${(tempIY*100).toFixed(1)}% Y<br>Bekräfta eller tryck på ny plats.`;
    document.getElementById('confirm-bar').classList.add('visible');
    pickState='img-pending'; return;
  }
  if(pickState==='picking-osm'||pickState==='osm-pending'){
    if(tempPin) map.removeLayer(tempPin);
    tempPin=L.marker(ll,{icon:xIcon,zIndexOffset:2000}).addTo(map);
    tempLat=ll.lat; tempLng=ll.lng;
    const pn=refs.length+1;
    document.getElementById('ci').innerHTML=
      `<strong>Punkt ${pn} – OSM-position</strong><br>`+
      dms(tempLat,'N','S')+'<br>'+dms(tempLng,'E','W')+'<br>Bekräfta eller tryck på ny plats.';
    document.getElementById('confirm-bar').classList.add('visible');
    pickState='osm-pending';
  }
}

function confirmPick() {
  const c=charts[calibIdx], pn=refs.length+1;
  if(pickState==='img-pending'){
    document.getElementById('confirm-bar').classList.remove('visible');
    if(c._layer) c._layer.setOpacity(.15);
    if(!osmOn) osmTile.addTo(map); osmTile.bringToBack();
    if(tempPin) map.removeLayer(tempPin);
    cPins.push(L.marker(
      L.latLng(c._ne[0]-tempIY*(c._ne[0]-c._sw[0]), c._sw[1]+tempIX*(c._ne[1]-c._sw[1])),
      {icon:ipIcon(pn),zIndexOffset:1500}).addTo(map));
    tempPin=null;
    document.getElementById('pb-badge').textContent=`PUNKT ${pn} · STEG 2/2`;
    document.getElementById('pb-badge').className='pb-badge badge-osm';
    document.getElementById('pb-title').textContent='Tryck på samma plats i OpenStreetMap';
    document.getElementById('pb-hint').textContent='Sjökortet är tonat — peka på den riktiga positionen';
    pickState='picking-osm'; return;
  }
  if(pickState==='osm-pending'){
    document.getElementById('confirm-bar').classList.remove('visible');
    document.getElementById('pick-banner').classList.remove('visible');
    map.off('click', onPickClick);
    if(tempPin) map.removeLayer(tempPin);
    cPins.push(L.marker(L.latLng(tempLat,tempLng),{icon:opIcon(pn),zIndexOffset:1500}).addTo(map));
    refs.push({imgX:tempIX,imgY:tempIY,lat:tempLat,lng:tempLng});
    tempIX=tempIY=tempLat=tempLng=null; tempPin=null; pickState='idle';
    if(c._layer) c._layer.setOpacity(c._opacity);
    if(!osmOn) map.removeLayer(osmTile);
    document.getElementById('bottom').classList.remove('hidden');
    document.getElementById('calib-panel').classList.add('open');
    renderCalibBody();
  }
}

function retryPick() {
  document.getElementById('confirm-bar').classList.remove('visible');
  if(tempPin){map.removeLayer(tempPin);tempPin=null;}
  if(pickState==='img-pending') pickState='picking-img';
  if(pickState==='osm-pending') pickState='picking-osm';
}

function cancelPick() {
  document.getElementById('pick-banner').classList.remove('visible');
  document.getElementById('confirm-bar').classList.remove('visible');
  map.off('click', onPickClick);
  if(tempPin){map.removeLayer(tempPin);tempPin=null;}
  if(pickState==='picking-osm'||pickState==='osm-pending'){
    const l=cPins.pop(); if(l) map.removeLayer(l);}
  pickState='idle';
  const c=charts[calibIdx];
  if(c?._layer) c._layer.setOpacity(c._opacity);
  if(!osmOn) map.removeLayer(osmTile); else osmTile.bringToBack();
  document.getElementById('bottom').classList.remove('hidden');
  document.getElementById('calib-panel').classList.add('open');
  renderCalibBody();
}

function delRef(i) {
  refs.splice(i,1);
  for(let j=i*2;j<i*2+2&&j<cPins.length;j++){if(cPins[j])map.removeLayer(cPins[j]);}
  cPins.splice(i*2,2);
  cPins.forEach((p,idx)=>p.setIcon(idx%2===1?opIcon(Math.floor(idx/2)+1):ipIcon(Math.floor(idx/2)+1)));
  renderCalibBody();
}

function calcBounds(c) {
  const n=refs.length; if(n<2) return [c._sw,c._ne];
  const sX=refs.reduce((s,p)=>s+p.imgX,0), sX2=refs.reduce((s,p)=>s+p.imgX**2,0);
  const sL=refs.reduce((s,p)=>s+p.lng,0),  sLX=refs.reduce((s,p)=>s+p.lng*p.imgX,0);
  const dX=n*sX2-sX**2;
  const swL=(sL*sX2-sX*sLX)/dX, neL=swL+(n*sLX-sX*sL)/dX;
  const sY=refs.reduce((s,p)=>s+p.imgY,0), sY2=refs.reduce((s,p)=>s+p.imgY**2,0);
  const sT=refs.reduce((s,p)=>s+p.lat,0),  sTY=refs.reduce((s,p)=>s+p.lat*p.imgY,0);
  const dY=n*sY2-sY**2;
  const latR=(sT*sY-n*sTY)/dY, neT=(sT+latR*sY)/n;
  return [[neT-latR,swL],[neT,neL]];
}
function calcRMS(pts,b) {
  let s=0; pts.forEach(p=>{
    const pL=b[1][0]-p.imgY*(b[1][0]-b[0][0]), pG=b[0][1]+p.imgX*(b[1][1]-b[0][1]);
    s+=(pL-p.lat)**2*111200**2+(pG-p.lng)**2*(111200*Math.cos(p.lat*Math.PI/180))**2;});
  return Math.sqrt(s/pts.length);
}

function applyCalib() {
  const c=charts[calibIdx], nb=calcBounds(c);
  c._sw=nb[0]; c._ne=nb[1];
  rebuildLayer(c); saveChart(c);
  cPins.forEach(p=>map.removeLayer(p)); cPins=[]; refs=[];
  updateOpRow(); closeCalib();
  map.fitBounds([c._sw,c._ne],{padding:[16,16]});
}

function applyPreset(sw,ne) {
  const c=charts[calibIdx]; c._sw=sw; c._ne=ne;
  rebuildLayer(c); saveChart(c); updateOpRow(); closeCalib();
}

// ═══════════════════════════════════════════════════════════════════
//  CALIBRATION FILE I/O
// ═══════════════════════════════════════════════════════════════════
function exportCalib() {
  const out = {
    version:'1.0', exported:new Date().toISOString(),
    note:'Lägg i repot som calibration.json för auto-laddning',
    calibrations: Object.fromEntries(charts.map(c=>[c.id,{sw:c._sw,ne:c._ne}]))
  };
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}));
  a.download='calibration.json'; a.click();
}

function importCalib(input) {
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try {
      const data=JSON.parse(e.target.result), cals=data.calibrations||{};
      let n=0;
      charts.forEach(c=>{
        if(cals[c.id]){c._sw=cals[c.id].sw;c._ne=cals[c.id].ne;rebuildLayer(c);saveChart(c);n++;}
      });
      updateOpRow(); renderLayerBody();
      alert(`✓ Importerade kalibrering för ${n} karta${n!==1?'r':''}`);
    } catch(err) { alert('Kunde inte läsa filen: '+err.message); }
  };
  r.readAsText(file); input.value='';
}

async function loadRepoCalib() {
  try {
    const r=await fetch('calibration.json?_='+Date.now()); if(!r.ok) return;
    const data=await r.json(), cals=data.calibrations||{};
    charts.forEach(c=>{
      if(!localStorage.getItem(lsKey(c.id))&&cals[c.id]){
        c._sw=cals[c.id].sw; c._ne=cals[c.id].ne; rebuildLayer(c);}
    });
    updateOpRow();
  } catch(e) {}
}


// ═══════════════════════════════════════════════════════════════════
//  DEPTH ESTIMATION  (tiny 300px canvas — ~400KB, not 40MB)
// ═══════════════════════════════════════════════════════════════════
const _depthCtx = {};   // chartId → { ctx, w, h }

function prepDepthCanvas(c) {
  if (_depthCtx[c.id]) { updateDepth(); return; }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    // Scale DOWN to max 300px wide before drawing → tiny canvas
    const scale = Math.min(1, 300 / img.naturalWidth);
    const w = Math.round(img.naturalWidth  * scale);
    const h = Math.round(img.naturalHeight * scale);
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    const ctx = cv.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    _depthCtx[c.id] = { ctx, w, h };
    updateDepth();
  };
  img.onerror = () => {};
  // Use the same URL — same-origin on GitHub Pages, no CORS issue
  img.src = c.file;
}

function sampleDepth(c, lat, lng) {
  const d = _depthCtx[c.id];
  if (!d) return null;
  // Map lat/lng → pixel in the thumbnail
  const px = Math.round((lng - c._sw[1]) / (c._ne[1] - c._sw[1]) * d.w);
  const py = Math.round((c._ne[0] - lat)  / (c._ne[0] - c._sw[0]) * d.h);
  if (px < 0 || px >= d.w || py < 0 || py >= d.h) return null;
  try {
    const [r, g, b] = d.ctx.getImageData(px, py, 1, 1).data;
    // Land: green/brown dominant
    if (g > b + 18 || (r > 160 && g > 160 && b < 140)) return { type:'land' };
    // Near-white margin / no data
    if (r > 225 && g > 225 && b > 225) return null;
    // Water: estimate depth from brightness
    // Lighter blue = shallower, darker = deeper
    const bright = (r + g + b) / 3;
    if (bright > 190) return { type:'water', label:'Grunt',        range:'0–5 m'  };
    if (bright > 160) return { type:'water', label:'Grunt–medel',  range:'5–10 m' };
    if (bright > 130) return { type:'water', label:'Medel',        range:'10–20 m'};
    if (bright > 100) return { type:'water', label:'Djupt',        range:'20–30 m'};
    return                 { type:'water', label:'Mycket djupt', range:'>30 m'  };
  } catch(e) { return null; }
}

function updateDepth() {
  // Use fake position or real GPS
  const pos = fakePos || (locMk ? locMk.getLatLng() : null);
  const badge = document.getElementById('depth-badge');
  if (!pos) { badge.classList.remove('visible'); return; }

  const idx = getActiveIdx();
  if (idx < 0) { badge.classList.remove('visible'); return; }

  const c = charts[idx];
  // Kick off canvas load if not ready yet
  if (!_depthCtx[c.id]) { prepDepthCanvas(c); return; }

  const result = sampleDepth(c, pos.lat, pos.lng);
  if (!result || result.type === 'land') { badge.classList.remove('visible'); return; }

  document.getElementById('db-value').textContent = result.label;
  document.getElementById('db-range').textContent = result.range;
  badge.classList.add('visible');
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
(async () => {
  loadApp();
  try {
    const r = await fetch('charts.json?_='+Date.now());
    const data = await r.json();
    await initCharts(data.charts || []);
  } catch(e) {
    document.getElementById('t-sub').textContent = 'Kunde inte ladda charts.json';
  }
  await loadRepoCalib();
  updateOpRow();
  startGPS();
})();
</script>
