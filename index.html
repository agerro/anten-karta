<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b1a2e">
  <title>Sjökort – Anten</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --bg:      #0b1a2e;
      --panel:   #0f2035;
      --border:  rgba(255,255,255,0.18);
      --text:    #ffffff;
      --muted:   #b8d4e8;
      --gold:    #f5c842;
      --teal:    #2a8aaa;
      --green:   #4ade80;
      --red:     #f87171;
      --overlay: rgba(11,26,46,0.96);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); }

    #map { position:absolute; inset:0; background:#0d2137; }

    /* ── Top bar ── */
    #topbar {
      position:absolute; top:0; left:0; right:0; z-index:1000;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px 12px;
      background: linear-gradient(to bottom, rgba(11,26,46,0.97) 70%, transparent);
      pointer-events:none;
    }
    .app-title { font-size:18px; font-weight:800; letter-spacing:1.5px; color:#fff; }
    .app-sub   { font-size:11px; color:var(--muted); letter-spacing:.5px; margin-top:1px; }
    #coord-box {
      text-align:right; font-family:monospace; line-height:1.5;
    }
    #coord-lat, #coord-lon { font-size:12px; color:var(--gold); display:block; }

    /* ── GPS pill ── */
    #gps-pill {
      position:absolute; top:72px; left:50%; transform:translateX(-50%);
      z-index:1000; pointer-events:none;
      padding:6px 16px; border-radius:20px;
      font-size:12px; font-weight:600; letter-spacing:.3px;
      border:1.5px solid var(--border); background:var(--overlay);
      color:var(--muted); white-space:nowrap;
      transition: opacity .4s, border-color .3s, color .3s;
    }
    #gps-pill.searching { border-color:var(--gold); color:var(--gold); }
    #gps-pill.found     { border-color:var(--green); color:var(--green); }
    #gps-pill.error     { border-color:var(--red); color:var(--red); }

    /* ── Bottom controls ── */
    #bottom {
      position:absolute; bottom:0; left:0; right:0; z-index:1000;
      padding:14px 16px 20px;
      background: linear-gradient(to top, rgba(11,26,46,0.97) 70%, transparent);
    }

    .slider-row {
      display:flex; align-items:center; gap:10px; margin-bottom:12px;
    }
    .slider-label {
      font-size:12px; font-weight:600; color:#fff; width:64px;
      letter-spacing:.3px;
    }
    input[type=range] {
      flex:1; -webkit-appearance:none; height:4px;
      border-radius:2px; background:var(--teal); outline:none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:20px; height:20px;
      border-radius:50%; background:var(--gold);
      border:2.5px solid var(--bg); cursor:pointer;
    }
    .slider-val {
      font-size:12px; font-weight:700; color:var(--gold);
      font-family:monospace; width:36px; text-align:right;
    }

    .btn-row { display:flex; gap:8px; }
    .btn {
      flex:1; padding:11px 8px; border:none; border-radius:10px;
      font-size:12px; font-weight:700; letter-spacing:.4px;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; gap:4px;
      transition: transform .12s, opacity .12s;
    }
    .btn:active { transform:scale(.96); opacity:.85; }
    .btn-gold  { background:var(--gold); color:var(--bg); }
    .btn-glass {
      background:rgba(255,255,255,0.12);
      color:#fff;
      border:1.5px solid rgba(255,255,255,0.25);
    }
    .btn-glass.active { background:var(--teal); border-color:var(--teal); }

    /* ── Calibration overlay ── */
    #calib-overlay {
      display:none; position:absolute; inset:0; z-index:2000;
      background:var(--overlay);
      flex-direction:column;
    }
    #calib-overlay.open { display:flex; }

    .calib-header {
      padding:18px 18px 12px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .calib-title {
      font-size:15px; font-weight:800; color:var(--gold);
      letter-spacing:.8px; text-transform:uppercase;
    }
    .calib-step-text {
      font-size:13px; color:#fff; margin-top:6px; line-height:1.5;
    }
    .calib-hint {
      font-size:11px; color:var(--muted); margin-top:4px; line-height:1.5;
    }

    .calib-content { flex:1; overflow-y:auto; padding:16px 18px; }

    /* step dots */
    .step-dots { display:flex; gap:8px; margin-bottom:14px; }
    .step-dot {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700;
      border:2px solid var(--border); color:var(--muted);
      background:rgba(255,255,255,0.06);
    }
    .step-dot.active { border-color:var(--gold); color:var(--gold); background:rgba(245,200,66,.12); }
    .step-dot.done   { border-color:var(--green); color:var(--green); background:rgba(74,222,128,.12); }

    /* reference point cards */
    .ref-card {
      background:rgba(255,255,255,0.07);
      border:1px solid var(--border);
      border-radius:10px; padding:12px 14px;
      margin-bottom:10px;
    }
    .ref-card-title {
      font-size:11px; font-weight:700; color:var(--muted);
      letter-spacing:.8px; text-transform:uppercase; margin-bottom:6px;
    }
    .ref-card-body { font-size:13px; color:#fff; font-family:monospace; line-height:1.6; }
    .ref-card-body .pending { color:var(--muted); font-style:italic; }
    .ref-tag {
      display:inline-block; padding:2px 8px; border-radius:4px;
      font-size:10px; font-weight:700; margin-left:6px;
      letter-spacing:.5px;
    }
    .tag-img  { background:rgba(42,138,170,.3);  color:#7dd3fc; }
    .tag-osm  { background:rgba(74,222,128,.25); color:var(--green); }

    /* presets */
    .preset-section-title {
      font-size:11px; font-weight:700; color:var(--muted);
      letter-spacing:.8px; text-transform:uppercase;
      margin:16px 0 8px;
    }
    .preset-btn {
      width:100%; padding:10px 14px; margin-bottom:7px;
      background:rgba(255,255,255,0.07);
      border:1px solid var(--border); border-radius:8px;
      color:#fff; font-size:12px; text-align:left;
      cursor:pointer; line-height:1.5;
    }
    .preset-btn strong { color:var(--gold); }
    .preset-btn .preset-coords { font-family:monospace; font-size:11px; color:var(--muted); }
    .preset-btn:active { background:rgba(42,138,170,.3); }

    .calib-footer {
      padding:12px 18px 22px; border-top:1px solid var(--border);
      display:flex; gap:8px; flex-shrink:0;
    }

    /* location marker */
    .loc-dot {
      width:14px; height:14px; position:relative;
    }
    .loc-dot::before {
      content:''; position:absolute; inset:0; border-radius:50%;
      background:var(--green); opacity:.25;
      animation: gps-pulse 1.6s ease-out infinite;
    }
    .loc-dot::after {
      content:''; position:absolute;
      top:50%; left:50%; transform:translate(-50%,-50%);
      width:10px; height:10px; border-radius:50%;
      background:var(--green); border:2px solid #fff;
      box-shadow:0 1px 4px rgba(0,0,0,.5);
    }
    @keyframes gps-pulse {
      0%   { transform:scale(1); opacity:.25; }
      100% { transform:scale(3.5); opacity:0; }
    }

    /* calib pin on map */
    .calib-pin {
      width:28px; height:28px; border-radius:50%;
      background:var(--gold); border:3px solid #fff;
      box-shadow:0 2px 6px rgba(0,0,0,.5);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:900; color:var(--bg);
    }

    /* leaflet fix */
    .leaflet-control-zoom { display:none; }
    .leaflet-control-attribution { display:none; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div>
    <div class="app-title">⚓ ANTEN</div>
    <div class="app-sub">Sjökort 1:50 000 · WGS84</div>
  </div>
  <div id="coord-box">
    <span id="coord-lat">–</span>
    <span id="coord-lon">–</span>
  </div>
</div>

<!-- GPS status -->
<div id="gps-pill" class="searching">◎ Söker GPS…</div>

<!-- Map -->
<div id="map"></div>

<!-- Bottom controls -->
<div id="bottom">
  <div class="slider-row">
    <span class="slider-label">Sjökort</span>
    <input type="range" id="opacity-sl" min="0" max="100" value="90">
    <span class="slider-val" id="opacity-lbl">90%</span>
  </div>
  <div class="btn-row">
    <button class="btn btn-gold"  onclick="locateMe()">◎ Hitta mig</button>
    <button class="btn btn-glass" id="btn-osm"   onclick="toggleOSM()">⊞ OSM</button>
    <button class="btn btn-glass" id="btn-fit"   onclick="fitMap()">⛶ Passa</button>
    <button class="btn btn-glass" id="btn-calib" onclick="openCalib()">⊕ Kalibrera</button>
  </div>
</div>

<!-- ── Calibration panel ── -->
<div id="calib-overlay">
  <div class="calib-header">
    <div class="calib-title" id="calib-title">⊕ Kalibrera</div>
    <div class="calib-step-text" id="calib-step-text"></div>
    <div class="calib-hint"     id="calib-hint"></div>
  </div>
  <div class="calib-content" id="calib-content">
    <!-- dynamic content -->
  </div>
  <div class="calib-footer">
    <button class="btn btn-glass" style="max-width:100px" onclick="closeCalib()">✕ Stäng</button>
    <button class="btn btn-gold"  id="calib-action-btn" onclick="calibAction()"></button>
  </div>
</div>

let chartLayer = L.imageOverlay(MAP_SRC, [sw, ne], {
  opacity: 0.90, interactive: false, zIndex: 10,
}).addTo(map);

let osmVisible = false;

// ────────────────────────────────────────────────
//  GPS
// ────────────────────────────────────────────────
let locMarker = null, accCircle = null, firstFix = true;

const locIcon = L.divIcon({
  className: '', html: '<div class="loc-dot"></div>',
  iconSize: [14,14], iconAnchor: [7,7],
});

function startGPS() {
  if (!navigator.geolocation) { setPill('GPS saknas','error'); return; }
  setPill('◎ Söker…','searching');
  navigator.geolocation.watchPosition(onPos, onErr,
    { enableHighAccuracy:true, maximumAge:2000, timeout:15000 });
}

function onPos(p) {
  const ll = L.latLng(p.coords.latitude, p.coords.longitude);
  const acc = p.coords.accuracy;
  if (locMarker) {
    locMarker.setLatLng(ll);
    accCircle.setLatLng(ll).setRadius(acc);
  } else {
    locMarker = L.marker(ll, { icon:locIcon, zIndexOffset:1000 }).addTo(map);
    accCircle  = L.circle(ll, { radius:acc, color:'#4ade80',
      fillColor:'#4ade80', fillOpacity:.07, weight:1, opacity:.4 }).addTo(map);
  }
  document.getElementById('coord-lat').textContent = dms(ll.lat,'N','S');
  document.getElementById('coord-lon').textContent = dms(ll.lng,'E','W');
  if (firstFix) { firstFix=false; map.setView(ll, 14, {animate:true}); }
  const a = acc < 10 ? acc.toFixed(1)+'m' : Math.round(acc)+'m';
  setPill('◎ GPS · ±'+a,'found');
  setTimeout(() => {
    const el = document.getElementById('gps-pill');
    if (el.classList.contains('found')) el.style.opacity = '0';
  }, 3500);
}

function onErr(e) {
  const m = {1:'Nekat av användaren',2:'Position ej tillgänglig',3:'Timeout'};
  setPill('✕ '+(m[e.code]||'GPS-fel'),'error');
}

function setPill(txt, cls) {
  const el = document.getElementById('gps-pill');
  el.textContent = txt; el.className = cls; el.style.opacity = '1';
}

function dms(v, pos, neg) {
  const dir = v>=0 ? pos : neg, a = Math.abs(v);
  const d = Math.floor(a), m = ((a-d)*60).toFixed(3);
  return d + '° ' + m + '′ ' + dir;
}

// ────────────────────────────────────────────────
//  CONTROLS
// ────────────────────────────────────────────────
function locateMe() {
  if (locMarker) map.setView(locMarker.getLatLng(), 15, {animate:true});
  else startGPS();
}

function toggleOSM() {
  osmVisible = !osmVisible;
  if (osmVisible) { osmLayer.addTo(map); osmLayer.bringToBack(); }
  else map.removeLayer(osmLayer);
  document.getElementById('btn-osm').classList.toggle('active', osmVisible);
}

function fitMap() { map.fitBounds([sw, ne], {padding:[16,16]}); }

document.getElementById('opacity-sl').addEventListener('input', function() {
  chartLayer.setOpacity(+this.value/100);
  document.getElementById('opacity-lbl').textContent = this.value + '%';
});

map.on('click', e => {
  const ll = e.latlng;
  L.popup({ className:'', closeButton:false })
    .setLatLng(ll)
    .setContent(`<div style="background:#0f2035;border:1px solid rgba(255,255,255,.2);
      color:#fff;font-family:monospace;font-size:12px;padding:8px 12px;border-radius:8px;line-height:1.7">
      ${dms(ll.lat,'N','S')}<br>${dms(ll.lng,'E','W')}</div>`)
    .openOn(map);
});

// ────────────────────────────────────────────────
//  CALIBRATION ENGINE
// ────────────────────────────────────────────────
/*
  3 modes:
  A) Preset  — pick pre-defined bounds
  B) 1-point — tap sjökort → tap OSM → translate (no scale change)
  C) 2-point — tap two pairs → translate + scale both axes
*/

let calibMode = 'menu'; // menu | pick-img1 | pick-osm1 | pick-img2 | pick-osm2 | review
let refPoints = [];     // [{imgX, imgY, lat, lng}, ...]
let calibPins = [];     // leaflet markers on map during calib

const calibPinIcon = (label) => L.divIcon({
  className: '', html: `<div class="calib-pin">${label}</div>`,
  iconSize: [28,28], iconAnchor: [14,14],
});

function openCalib() {
  refPoints = [];
  calibPins.forEach(p => map.removeLayer(p));
  calibPins = [];
  calibMode = 'menu';
  renderCalib();
  document.getElementById('calib-overlay').classList.add('open');
}

function closeCalib() {
  calibPins.forEach(p => map.removeLayer(p));
  calibPins = [];
  map.off('click', onCalibClick);
  document.getElementById('calib-overlay').classList.remove('open');
  // restore chart opacity
  chartLayer.setOpacity(+document.getElementById('opacity-sl').value/100);
}

function calibAction() {
  if (calibMode === 'pick-img1' || calibMode === 'pick-img2') return; // waiting for click
  if (calibMode === 'pick-osm1' || calibMode === 'pick-osm2') return;
  if (calibMode === 'review') applyCalib();
  if (calibMode === 'menu') {} // handled by buttons
}

function renderCalib() {
  const title   = document.getElementById('calib-title');
  const stepTxt = document.getElementById('calib-step-text');
  const hint    = document.getElementById('calib-hint');
  const content = document.getElementById('calib-content');
  const btn     = document.getElementById('calib-action-btn');
  map.off('click', onCalibClick);

  if (calibMode === 'menu') {
    title.textContent   = '⊕ Kalibrera karta';
    stepTxt.textContent = 'Välj kalibreringssätt';
    hint.textContent    = '';
    btn.textContent     = '';
    btn.style.display   = 'none';

    const pts1enabled = refPoints.length >= 1;
    const pts2enabled = refPoints.length >= 2;
    content.innerHTML = `
      <div class="preset-section-title">Peka-kalibrering</div>
      <button class="preset-btn" onclick="startPickCalib(1)">
        <strong>1-punkt</strong> — Flytta karta (behåller skalan)<br>
        <span class="preset-coords">Peka en känd punkt på sjökortet → peka på OSM</span>
      </button>
      <button class="preset-btn" onclick="startPickCalib(2)">
        <strong>2-punkter</strong> — Flytta + skala karta<br>
        <span class="preset-coords">Peka två kända punkter → ge riktiga positioner på OSM</span>
      </button>

      <div class="preset-section-title">Förinställningar</div>
      <button class="preset-btn" onclick="applyPreset(57.950,12.450,58.030,12.567)">
        <strong>Standard</strong><br>
        <span class="preset-coords">SW 57.950°N 12.450°E · NE 58.030°N 12.567°E</span>
      </button>
      <button class="preset-btn" onclick="applyPreset(57.935,12.430,58.045,12.585)">
        <strong>Bred</strong><br>
        <span class="preset-coords">SW 57.935°N 12.430°E · NE 58.045°N 12.585°E</span>
      </button>
      <button class="preset-btn" onclick="applyPreset(57.955,12.445,58.025,12.560)">
        <strong>Smal</strong><br>
        <span class="preset-coords">SW 57.955°N 12.445°E · NE 58.025°N 12.560°E</span>
      </button>`;
    return;
  }

  if (calibMode === 'pick-img1') {
    title.textContent   = '⊕ Steg 1 av ' + (calibMode.endsWith('1') ? (refPoints.length===0?'2':'2') : '4');
    stepTxt.textContent = 'Tryck på en känd punkt i sjökortet';
    hint.textContent    = 'Ex: en brygga, landmärke eller skär du känner igen';
    btn.style.display   = 'none';
    // Show chart, fade OSM
    chartLayer.setOpacity(0.92);
    map.on('click', onCalibClick);
    content.innerHTML = buildRefCards();
    return;
  }

  if (calibMode === 'pick-osm1') {
    title.textContent   = '⊕ Steg 2';
    stepTxt.textContent = 'Tryck på samma punkt i verklighetskartan';
    hint.textContent    = 'Sjökortet är tonat — tryck där landmärket faktiskt ligger';
    btn.style.display   = 'none';
    chartLayer.setOpacity(0.25);
    if (!osmVisible) { osmLayer.addTo(map); osmLayer.bringToBack(); }
    map.on('click', onCalibClick);
    content.innerHTML = buildRefCards();
    return;
  }

  if (calibMode === 'pick-img2') {
    title.textContent   = '⊕ Steg 3';
    stepTxt.textContent = 'Tryck på en andra känd punkt i sjökortet';
    hint.textContent    = 'Välj en punkt långt ifrån den första för bäst precision';
    btn.style.display   = 'none';
    chartLayer.setOpacity(0.92);
    map.on('click', onCalibClick);
    content.innerHTML = buildRefCards();
    return;
  }

  if (calibMode === 'pick-osm2') {
    title.textContent   = '⊕ Steg 4';
    stepTxt.textContent = 'Tryck på punkt B i verklighetskartan';
    hint.textContent    = 'Sjökortet är tonat — tryck där punkt B faktiskt ligger';
    btn.style.display   = 'none';
    chartLayer.setOpacity(0.25);
    map.on('click', onCalibClick);
    content.innerHTML = buildRefCards();
    return;
  }

  if (calibMode === 'review') {
    title.textContent   = '⊕ Tillämpa kalibrering?';
    stepTxt.textContent = 'Beräknade nya gränser baserat på dina referenspunkter';
    hint.textContent    = '';
    btn.textContent     = '✓ Tillämpa';
    btn.style.display   = '';
    const nb = calcBounds();
    content.innerHTML = buildRefCards() + `
      <div class="preset-section-title" style="margin-top:14px">Nya gränser</div>
      <div class="ref-card">
        <div class="ref-card-body">
          SW: ${nb[0][0].toFixed(5)}°N&nbsp; ${nb[0][1].toFixed(5)}°E<br>
          NE: ${nb[1][0].toFixed(5)}°N&nbsp; ${nb[1][1].toFixed(5)}°E
        </div>
      </div>`;
  }
}

function buildRefCards() {
  let html = '';
  const labels = ['A','B'];
  const needed = calibNPoints;
  for (let i=0; i<needed; i++) {
    const rp = refPoints[i];
    html += `<div class="ref-card">
      <div class="ref-card-title">Referenspunkt ${labels[i]}</div>
      <div class="ref-card-body">`;
    if (rp && rp.imgX !== undefined) {
      html += `Bild <span class="ref-tag tag-img">✓ SATT</span><br>`;
      html += `<span style="font-size:11px;color:var(--muted)">Pixel ${(rp.imgX*100).toFixed(1)}% , ${(rp.imgY*100).toFixed(1)}%</span><br>`;
    } else {
      html += `<span class="pending">Bild — klicka på sjökortet…</span><br>`;
    }
    if (rp && rp.lat !== undefined) {
      html += `OSM <span class="ref-tag tag-osm">✓ SATT</span><br>`;
      html += `<span style="font-size:11px;color:var(--muted)">${dms(rp.lat,'N','S')}</span><br>`;
      html += `<span style="font-size:11px;color:var(--muted)">${dms(rp.lng,'E','W')}</span>`;
    } else {
      html += `<span class="pending">OSM — klicka på verklighetskarta…</span>`;
    }
    html += `</div></div>`;
  }
  return html;
}

let calibNPoints = 1;

function startPickCalib(n) {
  calibNPoints = n;
  refPoints = [];
  calibMode = 'pick-img1';
  renderCalib();
}

function onCalibClick(e) {
  const ll = e.latlng;

  if (calibMode === 'pick-img1' || calibMode === 'pick-img2') {
    // Calculate normalized pixel in image from current bounds
    const imgX = (ll.lng - sw[1]) / (ne[1] - sw[1]);
    const imgY = (ne[0] - ll.lat) / (ne[0] - sw[0]);

    if (imgX < 0 || imgX > 1 || imgY < 0 || imgY > 1) {
      // Clicked outside image
      alert('Klicka innanför sjökortet!'); return;
    }

    const idx = calibMode === 'pick-img1' ? 0 : 1;
    if (!refPoints[idx]) refPoints[idx] = {};
    refPoints[idx].imgX = imgX;
    refPoints[idx].imgY = imgY;

    // Pin on map
    if (calibPins[idx]) map.removeLayer(calibPins[idx]);
    calibPins[idx] = L.marker(ll, {
      icon: calibPinIcon(idx===0 ? 'A' : 'B'),
      zIndexOffset: 2000,
    }).addTo(map);

    map.off('click', onCalibClick);
    calibMode = calibMode === 'pick-img1' ? 'pick-osm1' : 'pick-osm2';
    renderCalib();
    return;
  }

  if (calibMode === 'pick-osm1' || calibMode === 'pick-osm2') {
    const idx = calibMode === 'pick-osm1' ? 0 : 1;
    refPoints[idx].lat = ll.lat;
    refPoints[idx].lng = ll.lng;

    // Move the pin to the real position
    if (calibPins[idx]) calibPins[idx].setLatLng(ll);

    map.off('click', onCalibClick);

    if (calibNPoints === 2 && calibMode === 'pick-osm1') {
      calibMode = 'pick-img2';
    } else {
      calibMode = 'review';
    }
    renderCalib();
    return;
  }
}

function calcBounds() {
  if (refPoints.length === 0) return [sw, ne];

  if (refPoints.length === 1) {
    const p = refPoints[0];
    // What lat/lng does the current overlay assign to imgX,imgY?
    const curLat = ne[0] - p.imgY * (ne[0] - sw[0]);
    const curLng = sw[1] + p.imgX * (ne[1] - sw[1]);
    const dLat = p.lat - curLat;
    const dLng = p.lng - curLng;
    return [
      [sw[0] + dLat, sw[1] + dLng],
      [ne[0] + dLat, ne[1] + dLng],
    ];
  }

  if (refPoints.length >= 2) {
    const p1 = refPoints[0], p2 = refPoints[1];
    // Solve for latRange and lngRange
    const dImgY = p2.imgY - p1.imgY;
    const dImgX = p2.imgX - p1.imgX;
    const latRange = dImgY !== 0
      ? (p1.lat - p2.lat) / dImgY   // lat decreases as imgY increases
      : (ne[0] - sw[0]);
    const lngRange = dImgX !== 0
      ? (p2.lng - p1.lng) / dImgX
      : (ne[1] - sw[1]);
    // lat_NE = p1.lat + p1.imgY * latRange
    const newNELat = p1.lat + p1.imgY * latRange;
    const newSWLat = newNELat - latRange;
    const newSWLng = p1.lng - p1.imgX * lngRange;
    const newNELng = newSWLng + lngRange;
    return [[newSWLat, newSWLng], [newNELat, newNELng]];
  }
}

function applyCalib() {
  const nb = calcBounds();
  sw = nb[0]; ne = nb[1];
  rebuildChart();
  calibPins.forEach(p => map.removeLayer(p));
  calibPins = [];
  if (!osmVisible) map.removeLayer(osmLayer);
  closeCalib();
  fitMap();
}

function applyPreset(swLat, swLon, neLat, neLon) {
  sw = [swLat, swLon]; ne = [neLat, neLon];
  rebuildChart();
  closeCalib();
  fitMap();
}

function rebuildChart() {
  const op = +document.getElementById('opacity-sl').value / 100;
  map.removeLayer(chartLayer);
  chartLayer = L.imageOverlay(MAP_SRC, [sw, ne], {
    opacity: op, interactive: false, zIndex: 10,
  }).addTo(map);
  if (osmVisible) osmLayer.bringToBack();
}

// ────────────────────────────────────────────────
//  INIT
// ────────────────────────────────────────────────
map.fitBounds([sw, ne], { padding: [12, 12] });
startGPS();
</script>
</body>
</html>
